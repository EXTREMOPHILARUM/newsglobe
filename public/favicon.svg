<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="land" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <!-- Globe body -->
  <circle cx="256" cy="256" r="200" fill="url(#globe)"/>
  <!-- Grid lines (longitude) -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="130" ry="200" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="50" ry="200" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <!-- Grid lines (latitude) -->
  <ellipse cx="256" cy="180" rx="185" ry="30" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="256" cy="256" rx="200" ry="30" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="256" cy="332" rx="185" ry="30" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <!-- Stylized land masses -->
  <!-- Americas-ish -->
  <path d="M180 160 Q170 190 175 220 Q180 240 170 260 Q165 280 175 310 Q180 320 172 340" fill="none" stroke="url(#land)" stroke-width="18" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Europe/Africa-ish -->
  <path d="M260 140 Q270 160 265 180 Q260 200 270 220 Q275 250 268 280 Q262 310 270 350" fill="none" stroke="url(#land)" stroke-width="16" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Asia-ish -->
  <path d="M310 150 Q340 170 350 200 Q355 220 345 240 Q335 250 340 260" fill="none" stroke="url(#land)" stroke-width="20" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Signal pulses (news broadcasting) -->
  <circle cx="280" cy="190" r="8" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="190" r="20" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="12;35" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="190" r="20" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="12;50" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Second pulse point -->
  <circle cx="190" cy="250" r="5" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="250" r="15" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="8;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Third pulse point -->
  <circle cx="340" cy="230" r="5" fill="#a855f7">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="340" cy="230" r="15" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="8;28" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <!-- Specular highlight -->
  <ellipse cx="210" cy="190" rx="70" ry="80" fill="white" opacity="0.06"/>
</svg>
